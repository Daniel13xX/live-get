version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stream-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-livestream}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/Dockerfile.backend
    container_name: stream-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-livestream}?schema=public
      JWT_SECRET: ${JWT_SECRET:-productionjwtsecretchange_me!}
      STORAGE_DIR: /storage
      WORKER_URL: http://worker-stream:5001
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpassword123}
    volumes:
      - shared-storage:/storage
    depends_on:
      db:
        condition: service_healthy

  worker-stream:
    build:
      context: ./apps/worker-stream
      dockerfile: ../../docker/Dockerfile.worker
    container_name: stream-worker
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-livestream}?schema=public
      STORAGE_DIR: /storage
    volumes:
      - shared-storage:/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    container_name: stream-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    depends_on:
      - backend

volumes:
  db-data:
  shared-storage:
